name: Update GitHub Streak

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/streak-stats.yml"

jobs:
  update-streak:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=suhanichawla29&theme=tokyonight&hide_border=true&disable_animations=true&mode=daily
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save updated streak card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update GitHub streak" || exit 0
          git push
          
